name: Deploy RabbitMQ Service

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'ansible/**'
      - 'rabbitmq/**'
      - 'scripts/prepare-server-for-ansible.sh'
      - '.github/workflows/deploy-rabbitmq.yaml'

jobs:
  deploy_rabbitmq:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy RabbitMQ
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.CLOUD_HOST }}
          username: ${{ secrets.CLOUD_USERNAME }}
          key: ${{ secrets.CLOUD_KEY }}
          script: |
            set -euo pipefail

            cd /home/almonium/infra
            git fetch origin main
            git reset --hard origin/main

            mkdir -p ~/.ansible
            umask 077

            VAULT_ALL="$(mktemp ~/.ansible/vault-pass-all.XXXXXX)"
            VAULT_ALMONIUM_PROD="$(mktemp ~/.ansible/vault-pass-almonium-prod.XXXXXX)"
            VAULT_ALMONIUM_STAGING="$(mktemp ~/.ansible/vault-pass-almonium-staging.XXXXXX)"

            trap 'rm -f "$VAULT_ALL" "VAULT_ALMONIUM_PROD" "VAULT_ALMONIUM_STAGING"' EXIT

            printf "%s" "${{ secrets.ANSIBLE_VAULT_PASSWORD_ALL }}" > "$VAULT_ALL"
            printf "%s" "${{ secrets.ANSIBLE_VAULT_PASSWORD_ALMONIUM_PROD }}" > "$VAULT_ALMONIUM_PROD"
            printf "%s" "${{ secrets.ANSIBLE_VAULT_PASSWORD_ALMONIUM_STAGING }}" > "$VAULT_ALMONIUM_STAGING"

            ansible-playbook \
              -i ansible/inventory/oci.ini \
              ansible/playbook-deploy-rabbitmq.yaml \
              -l oci \
              -c local \
              -e ansible_python_interpreter=/usr/bin/python3 \
              --vault-id all@"$VAULT_ALL" \
              --vault-id prod@"$VAULT_ALMONIUM_PROD" \
              --vault-id staging@"$VAULT_ALMONIUM_STAGING"
