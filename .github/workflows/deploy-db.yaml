name: Deploy Postgres DB

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'ansible/**'
      - 'services/postgres/**'
      - '.github/workflows/deploy-db.yaml'

jobs:
  deploy-db:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.CLOUD_KEY }}

      - name: Install Ansible and Docker collection
        run: |
          set -euo pipefail
          python -m venv ansible_venv
          source ansible_venv/bin/activate
          pip install ansible
          ansible-galaxy collection install community.docker

      - name: Deploy Postgres with Ansible
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          VAULT_PASS_ALL: ${{ secrets.ANSIBLE_VAULT_PASSWORD_ALL }}
        run: |
          set -euo pipefail

          source ansible_venv/bin/activate
          cd ansible

          mkdir -p ~/.ansible
          umask 077
          VAULT_FILE="$(mktemp ~/.ansible/vault-pass-all.XXXXXX)"
          trap 'rm -f "$VAULT_FILE"' EXIT
          printf "%s" "$VAULT_PASS_ALL" > "$VAULT_FILE"

          ansible-playbook \
            -i inventory/hosts.ini \
            --limit almonium \
            playbook-deploy-db.yaml \
            -e ansible_python_interpreter=/usr/bin/python3 \
            --vault-id all@"$VAULT_FILE"
