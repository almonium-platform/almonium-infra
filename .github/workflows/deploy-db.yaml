name: Deploy Postgres DB

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'ansible/**'
      - 'services/postgres/**'
      - 'scripts/prepare-server-for-ansible.sh'
      - '.github/workflows/deploy-db.yaml'

jobs:
  deploy-db:
    runs-on: ubuntu-latest
    steps:
      - name: SSH, pull + run ansible
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.CLOUD_HOST }}
          username: ${{ secrets.CLOUD_USERNAME }}
          key: ${{ secrets.CLOUD_KEY }}
          script: |
            set -euo pipefail

            cd /home/almonium/infra
            git fetch origin main
            git reset --hard origin/main

            mkdir -p ~/.ansible
            umask 077
            VAULT_FILE="$(mktemp ~/.ansible/vault-pass-all.XXXXXX)"
            trap 'rm -f "$VAULT_FILE"' EXIT
            printf "%s" "${{ secrets.ANSIBLE_VAULT_PASSWORD_ALL }}" > "$VAULT_FILE"
            
            ansible-playbook \
              -i ansible/inventory/oci.ini \
              ansible/playbook-deploy-db.yaml \
              -l oci \
              -c local \
              -e ansible_python_interpreter=/usr/bin/python3 \
              --vault-id all@"$VAULT_FILE"
