- name: Deploy fam-sub frontend
  hosts: all
  become: false
  vars:
    service_dir: /home/almonium/infra/services/fam-sub-fe

  tasks:
    - name: Log in to GitHub Container Registry
      community.docker.docker_login:
        registry: ghcr.io
        username: "{{ deploy_gh_actor }}"
        password: "{{ deploy_gh_token }}"

    - name: Pull and restart fam-sub frontend
      community.docker.docker_compose_v2:
        project_src: "{{ service_dir }}"
        state: present
        pull: always
        remove_orphans: true
      environment:
        FAMSUB_FE_IMAGE_TAG: "{{ deploy_image_tag }}"
