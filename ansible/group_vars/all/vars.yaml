db_admin_user: "postgres"
rabbitmq_admin_user: "admin"

postgres_app_tenants:
  - app_id: "almonium"
    environment: "prod"
    db_name: "almonium"
    db_user: "almonium_prod"
    db_schema: "public"
    backup: true

  - app_id: "almonium"
    environment: "staging"
    db_name: "almonium_staging"
    db_user: "almonium_staging"
    db_schema: "public"
    backup: true

  - app_id: "fam_sub"
    environment: "main"
    db_name: "fam_sub"
    db_user: "fam_sub_user"
    db_schema: "public"
    backup: true

platform:
  db:
    host: "pgbouncer"
    port: "6432"
  rabbitmq:
    host: "rabbitmq"
    port: "5672"
