services:
  famsub-fe:
    image: ghcr.io/okuzan/fam-sub-fe:${FAMSUB_FE_IMAGE_TAG:-latest}
    container_name: famsub_fe
    volumes:
      - ../../nginx-configs/spa.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - proxy-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.famsub.rule=Host(`famsub.almonium.com`)"
      - "traefik.http.routers.famsub.entrypoints=websecure"
      - "traefik.http.routers.famsub.tls.certresolver=porkbun"
      - "traefik.http.services.famsub.loadbalancer.server.port=80"
    restart: unless-stopped

networks:
  proxy-net:
    external: true
